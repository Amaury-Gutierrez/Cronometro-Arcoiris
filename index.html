<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cronómetro Arcoíris</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      
      /* Degradado gigante con los colores del arcoíris. */
      background: linear-gradient(135deg, 
        #ff9999, /* 1. Rojo */
        #ffcc99, /* 2. Naranja */
        #ffff99, /* 3. Amarillo */
        #99ff99, /* 4. Verde */
        #99ccff, /* 5. Azul */
        #cc99ff, /* 6. Morado */
        #ff9999, /* 7. Rojo (Cierra el ciclo) */
        #ffcc99  /* 8. Naranja (Empata con el inicio) */
      );
      
      background-size: 700% 700%;
      
      /* 360s en total / 6 pares de colores = 60 segundos por color */
      animation: degradado-arcoiris 360s linear infinite;
      
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    @keyframes degradado-arcoiris {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    /* =========================================
       NUEVO: FONDO DEL CAMPO ESTÁTICO
       ========================================= */
    .fondo-campo {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 45vh; /* Puedes ajustar esta altura si tu imagen es más alta o más bajita */

      background-image: url("images/campo.png");
      background-repeat: no-repeat;
      background-position: bottom center;
      background-size: 100% auto;

      z-index: 0; /* Al fondo de todo */
      pointer-events: none; /* Permite hacer clic a través de él para agarrar bolitas */
    }

    /* =========================================
       ANIMACIONES Y ESTILOS DE DECORACIÓN 
       ========================================= */
    .decoracion-fondo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0; /* Comparte el fondo con el campo */
      pointer-events: none; 
      overflow: hidden;
    }

    .decoracion-fondo img {
      position: absolute;
      user-select: none;
    }

    /* Sol pulsante y rotando ligeramente */
    .deco-sol {
      width: clamp(120px, 15vw, 300px);
      top: 5%;
      right: 8%;
      animation: animacion-sol 4s ease-in-out infinite alternate;
    }

    @keyframes animacion-sol {
      from { transform: scale(1) rotate(0deg); }
      to { 
        transform: scale(1.08) rotate(5deg); 
        filter: drop-shadow(0 0 20px rgba(255, 220, 0, 0.7)); 
      }
    }

    /* Arcoíris flotante */
    .deco-arcoiris {
      width: clamp(200px, 25vw, 350px);
      top: 10%;
      left: 3%;
      opacity: 0.9;
      animation: flotar-arcoiris 6s ease-in-out infinite alternate;
    }

    @keyframes flotar-arcoiris {
      from { transform: translateY(0) rotate(-2deg); }
      to { transform: translateY(-15px) rotate(3deg); }
    }

    /* Nubes oscilantes */
    .deco-nube {
      opacity: 0.85;
      animation: flotar-nube 5s ease-in-out infinite alternate;
      filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.15));
    }

    .nube1 { width: 180px; top: 18%; left: 20%; animation-duration: 6s; }
    .nube2 { width: 120px; top: 8%; left: 45%; animation-duration: 4.5s; animation-delay: 1s; }
    .nube3 { width: 220px; top: 30%; right: 15%; animation-duration: 7s; animation-delay: 2s; }
    .nube4 { width: 150px; bottom: 20%; left: 10%; animation-duration: 5.5s; animation-delay: 0.5s; opacity: 0.6; }

    @keyframes flotar-nube {
      from { transform: translateY(0) translateX(0); }
      to { transform: translateY(-12px) translateX(10px); }
    }
    /* ========================================= */


    #zona-bolitas {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 100vh; 
      z-index: 1; /* Por encima de la decoración y el campo */
      overflow: hidden;
      pointer-events: none;
    }

    .bolita-suelta {
      position: absolute;
      width: 200px; 
      height: auto;
      cursor: grab;
      user-select: none;
      touch-action: none;
      pointer-events: auto;
      transition: transform 0.15s;
      filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.25)); 
    }

    .bolita-suelta:active {
      cursor: grabbing;
      transform: scale(1.5); 
    }

    .nombre-autor {
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);

      background-color: #f3e5f5;
      color: #6a1b9a;
      border: 3px solid #ab47bc;
      border-radius: 18px;

      padding: 8px 22px;
      font-size: 17px;
      font-weight: bold;
      letter-spacing: 0.4px;

      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.18);
      white-space: nowrap;
    }

    .contenedor {
      position: relative;
      z-index: 2; /* Por encima de las bolitas */
      background-color: rgba(255, 255, 255, 0.95);
      border: 5px solid #ab47bc; 
      border-radius: 30px;
      padding: 45px 50px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      width: 520px;     
      min-height: 320px; 
      backdrop-filter: blur(2px);
    }

    h1 {
      background: linear-gradient(to right, #ff3b30, #ff9500, #4cd964, #5ac8fa, #007aff, #5856d6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 10px;
      font-size: 50px;
    }
    
    .arcoiris-principal {
      font-size: 100px;
      margin: 10px 0;
      animation: saltito 1s infinite alternate;
    }

    @keyframes saltito {
      from { transform: translateY(0); }
      to { transform: translateY(-10px); }
    }

    #tiempo {
      font-size: 48px;
      font-weight: bold;
      color: #4a148c;
      margin: 25px 0;
      background-color: #f3e5f5;
      padding: 15px;
      border-radius: 20px;
      border: 3px dashed #ce93d8;
    }

    .botones button {
      font-size: 18px;
      padding: 12px 18px;
      margin: 8px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    #play {
      background-color: #4cd964;
      color: white;
    }

    #detener {
      background-color: #ff3b30;
      color: white;
    }

    #reiniciar {
      background-color: #007aff;
      color: white;
    }

    button:hover {
      transform: scale(1.08);
      opacity: 0.9;
    }

    .mensaje {
      color: #9a6500;
      font-size: 16px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <div class="fondo-campo"></div>

  <div class="decoracion-fondo">
    <img src="images/sol.png" class="deco-sol" alt="Sol animado">
    <img src="images/arcoiris.png" class="deco-arcoiris" alt="Arcoíris animado">
    <img src="images/nube.png" class="deco-nube nube1" alt="Nube">
    <img src="images/nube.png" class="deco-nube nube2" alt="Nube">
    <img src="images/nube.png" class="deco-nube nube3" alt="Nube">
  </div>

  <div id="zona-bolitas"></div>

  <div class="contenedor">

    <div class="nombre-autor">🌈 María Teresa Palomino Nájera 🌈</div>

    <h1>Cronómetro Arcoíris</h1>

    <div class="arcoiris-principal">🌈</div>

    <div id="tiempo">00:00.00</div>

    <div class="botones">
      <button id="play">▶️ Play</button>
      <button id="detener">⏸️ Detener</button>
      <button id="reiniciar">🔄 Reiniciar</button>
    </div>

  </div>

<script>
  let tiempo_acumulado = 0;  
  let tiempo_inicio = null;  
  let intervalo = null;

  const limite = 15 * 60 * 1000;

  const tiempo = document.getElementById("tiempo");
  const boton_play = document.getElementById("play");
  const boton_detener = document.getElementById("detener");
  const boton_reiniciar = document.getElementById("reiniciar");

  const zona_bolitas = document.getElementById("zona-bolitas");

  const tiempo_entre_bolitas = 1 * 60 * 1000; // 1 minuto exacto
  const velocidad_bolitas = 1.5;

  let lista_bolitas = [];
  let animacion_bolitas = null;
  let bolitas_activas = false;
  
  // Empezamos en 0 para que la primer bolita salga inmediatamente al dar 'Play'
  let siguiente_bolita_ms = 0; 

  function mostrar_tiempo(ms) {
    let minutos = Math.floor(ms / 60000);
    let segundos = Math.floor((ms % 60000) / 1000);
    let milesimas = Math.floor((ms % 1000) / 10);

    let minutos_texto = String(minutos).padStart(2, "0");
    let segundos_texto = String(segundos).padStart(2, "0");
    let milesimas_texto = String(milesimas).padStart(2, "0");

    tiempo.textContent = minutos_texto + ":" + segundos_texto + "." + milesimas_texto;
  }

  function generar_bolitas_por_tiempo(transcurrido) {
    while (
      siguiente_bolita_ms <= limite &&
      transcurrido >= siguiente_bolita_ms
    ) {
      // Determinamos en qué minuto estamos para saber qué color de bolita sacar
      let minuto_actual = Math.floor(siguiente_bolita_ms / 60000);
      
      crear_bolita(minuto_actual);
      siguiente_bolita_ms += tiempo_entre_bolitas;
    }
  }

  function actualizar_cronometro() {
    let ahora = performance.now();
    let transcurrido = tiempo_acumulado + (ahora - tiempo_inicio);

    if (transcurrido >= limite) {
      transcurrido = limite;

      generar_bolitas_por_tiempo(transcurrido);
      mostrar_tiempo(transcurrido);

      clearInterval(intervalo);
      intervalo = null;
      tiempo_acumulado = limite;

      detener_bolitas();

      return;
    }

    generar_bolitas_por_tiempo(transcurrido);
    mostrar_tiempo(transcurrido);
  }

  function iniciar_cronometro() {
    if (intervalo === null && tiempo_acumulado < limite) {
      tiempo_inicio = performance.now();
      intervalo = setInterval(actualizar_cronometro, 10);
      iniciar_bolitas();
    }
  }

  function detener_cronometro() {
    if (intervalo !== null) {
      tiempo_acumulado += performance.now() - tiempo_inicio;
      clearInterval(intervalo);
      intervalo = null;
      detener_bolitas();
    }
  }

  function reiniciar_cronometro() {
    clearInterval(intervalo);
    intervalo = null;
    tiempo_acumulado = 0;
    tiempo_inicio = null;

    mostrar_tiempo(0);
    reiniciar_bolitas();
  }

  function crear_bolita(minuto) {
    const bolita_elem = document.createElement("img");
    bolita_elem.classList.add("bolita-suelta");
    bolita_elem.draggable = false; 

    const imagenes_bolitas = [
      "images/bolita_roja.png",
      "images/bolita_naranja.png",
      "images/bolita_amarilla.png",
      "images/bolita_verde.png",
      "images/bolita_azul.png",
      "images/bolita_morada.png"
    ];

    const indice = minuto % imagenes_bolitas.length;
    bolita_elem.src = imagenes_bolitas[indice];

    zona_bolitas.appendChild(bolita_elem);

    const size = 80; 
    const ancho = zona_bolitas.clientWidth;
    const alto = zona_bolitas.clientHeight;

    const x = Math.random() * (ancho - size);
    const y = Math.random() * (alto - size);

    const datos = {
      elemento: bolita_elem,
      x,
      y,
      dx: (Math.random() - 0.5) * velocidad_bolitas * 2,
      dy: (Math.random() - 0.5) * velocidad_bolitas * 2,
      arrastrando: false
    };

    actualizar_posicion_bolita(datos);
    activar_arrastre_bolita(datos);

    lista_bolitas.push(datos);
  }

  function activar_arrastre_bolita(datos) {
    const bolita_elem = datos.elemento;

    let offsetX = 0;
    let offsetY = 0;

    bolita_elem.addEventListener("pointerdown", (e) => {
      datos.arrastrando = true;

      const rect = bolita_elem.getBoundingClientRect();

      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;

      bolita_elem.setPointerCapture(e.pointerId);
    });

    bolita_elem.addEventListener("pointermove", (e) => {
      if (!datos.arrastrando) return;

      const rect_zona = zona_bolitas.getBoundingClientRect();

      datos.x = e.clientX - rect_zona.left - offsetX;
      datos.y = e.clientY - rect_zona.top - offsetY;

      limitar_bolita_a_zona(datos);
      actualizar_posicion_bolita(datos);
    });

    bolita_elem.addEventListener("pointerup", () => {
      datos.arrastrando = false;
      datos.dx = (Math.random() - 0.5) * velocidad_bolitas * 2;
      datos.dy = (Math.random() - 0.5) * velocidad_bolitas * 2;
    });

    bolita_elem.addEventListener("pointercancel", () => {
      datos.arrastrando = false;
    });
  }

  function limitar_bolita_a_zona(datos) {
    const size = datos.elemento.offsetWidth || 80;
    const ancho = zona_bolitas.clientWidth;
    const alto = zona_bolitas.clientHeight;

    datos.x = Math.max(0, Math.min(ancho - size, datos.x));
    datos.y = Math.max(0, Math.min(alto - size, datos.y));
  }

  function actualizar_posicion_bolita(datos) {
    datos.elemento.style.left = datos.x + "px";
    datos.elemento.style.top = datos.y + "px";
  }

  function mover_bolitas() {
    if (!bolitas_activas) return;

    lista_bolitas.forEach(datos => {
      if (datos.arrastrando) return;

      datos.x += datos.dx;
      datos.y += datos.dy;

      const size = datos.elemento.offsetWidth || 80;
      const ancho = zona_bolitas.clientWidth;
      const alto = zona_bolitas.clientHeight;

      if (datos.x <= 0 || datos.x >= ancho - size) {
        datos.dx *= -1;
      }

      if (datos.y <= 0 || datos.y >= alto - size) {
        datos.dy *= -1;
      }

      if (Math.random() < 0.02) {
        datos.dx = (Math.random() - 0.5) * velocidad_bolitas * 2;
        datos.dy = (Math.random() - 0.5) * velocidad_bolitas * 2;
      }

      limitar_bolita_a_zona(datos);
      actualizar_posicion_bolita(datos);
    });

    animacion_bolitas = requestAnimationFrame(mover_bolitas);
  }

  function iniciar_bolitas() {
    if (bolitas_activas) return;

    bolitas_activas = true;
    mover_bolitas();
  }

  function detener_bolitas() {
    bolitas_activas = false;

    if (animacion_bolitas !== null) {
      cancelAnimationFrame(animacion_bolitas);
      animacion_bolitas = null;
    }
  }

  function reiniciar_bolitas() {
    detener_bolitas();

    lista_bolitas.forEach(datos => {
      datos.elemento.remove();
    });

    lista_bolitas = [];
    siguiente_bolita_ms = 0; 
  }

  boton_play.addEventListener("click", iniciar_cronometro);
  boton_detener.addEventListener("click", detener_cronometro);
  boton_reiniciar.addEventListener("click", reiniciar_cronometro);

  mostrar_tiempo(0);
</script>

</body>
</html>
