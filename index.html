<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cronómetro Arcoíris</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      /* Fondo con gradiente de arcoíris suave */
      background: linear-gradient(135deg, #ff9999, #ffcc99, #ffff99, #99ff99, #99ccff, #cc99ff);
      background-size: 200% 200%;
      animation: mover-fondo 10s ease infinite;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* Pequeña animación para que el fondo arcoíris se mueva suavemente */
    @keyframes mover-fondo {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .fondo-granja {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 70vh;

      background-image: url("images/granja.png");
      background-repeat: no-repeat;
      background-position: bottom center;
      background-size: 100% auto;

      z-index: 0;
      pointer-events: none;
    }

    .decoracion-cielo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 55vh;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .decoracion-cielo img {
      position: absolute;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
    }

    .sol-img {
      width: clamp(90px, 10vw, 150px);
      top: 4vh;
      right: 25vw;
      animation: brillo-sol 3s ease-in-out infinite alternate;
    }

    .nube-img {
      opacity: 0.95;
      filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.08));
    }

    .nube-1 {
      width: clamp(130px, 16vw, 240px);
      top: 15vh;
      left: 15vw;
      animation: flotar-nube-1 5s ease-in-out infinite alternate;
    }

    .nube-2 {
      width: clamp(110px, 13vw, 210px);
      top: 24vh;
      right: 15vw;
      opacity: 0.85;
      animation: flotar-nube-2 6s ease-in-out infinite alternate;
    }

    .nube-3 {
      width: clamp(170px, 10vw, 300px);
      top: 3vh;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      animation: flotar-nube-arcoiris-anim 4.5s ease-in-out infinite alternate;
    }

    @keyframes flotar-nube-1 {
      from { transform: translateY(0); }
      to { transform: translateY(10px); }
    }

    @keyframes flotar-nube-2 {
      from { transform: translateY(0) translateX(0); }
      to { transform: translateY(-8px) translateX(-10px); }
    }

    @keyframes flotar-nube-arcoiris-anim {
      from { transform: translateX(-50%) translateY(0) rotate(-1deg); }
      to { transform: translateX(-50%) translateY(12px) rotate(1deg); }
    }

    @keyframes brillo-sol {
      from {
        transform: scale(1);
        filter: drop-shadow(0 0 4px rgba(255, 196, 0, 0.4));
      }
      to {
        transform: scale(1.05);
        filter: drop-shadow(0 0 14px rgba(255, 196, 0, 0.65));
      }
    }

    #zona-arcoiris {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 20vh;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }
    .arcoiris-suelto {
      position: absolute;
      font-size: 75px;
      cursor: grab;
      user-select: none;
      touch-action: none;
      pointer-events: auto;
      transition: transform 0.15s;
    }
    .arcoiris-suelto:active {
      cursor: grabbing;
      transform: scale(1.15);
    }

    .nombre-autor {
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);

      background-color: #f3e5f5;
      color: #6a1b9a;
      border: 3px solid #ab47bc;
      border-radius: 18px;

      padding: 8px 22px;
      font-size: 17px;
      font-weight: bold;
      letter-spacing: 0.4px;

      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.18);
      white-space: nowrap;
    }

    .contenedor {
      position: relative;
      z-index: 2;
      background-color: rgba(255, 255, 255, 0.95);
      border: 5px solid #ab47bc; 
      border-radius: 30px;
      padding: 45px 50px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      width: 520px;     
      min-height: 320px; 
      backdrop-filter: blur(2px);
    }

    h1 {
      background: linear-gradient(to right, #ff3b30, #ff9500, #4cd964, #5ac8fa, #007aff, #5856d6);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 10px;
      font-size: 50px;
    }
    
    .arcoiris-principal {
      font-size: 100px;
      margin: 10px 0;
      animation: saltito 1s infinite alternate;
    }

    @keyframes saltito {
      from { transform: translateY(0); }
      to { transform: translateY(-10px); }
    }

    #tiempo {
      font-size: 48px;
      font-weight: bold;
      color: #4a148c;
      margin: 25px 0;
      background-color: #f3e5f5;
      padding: 15px;
      border-radius: 20px;
      border: 3px dashed #ce93d8;
    }
    .botones button {
      font-size: 18px;
      padding: 12px 18px;
      margin: 8px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    #play {
      background-color: #4cd964;
      color: white;
    }

    #detener {
      background-color: #ff3b30;
      color: white;
    }

    #reiniciar {
      background-color: #007aff;
      color: white;
    }

    button:hover {
      transform: scale(1.08);
      opacity: 0.9;
    }
    .mensaje {
      color: #9a6500;
      font-size: 16px;
      margin-top: 15px;
    }
  </style>
</head>

<body>
  <div class="decoracion-cielo">
    <img src="images/sol.png" class="sol-img" alt="Sol">

    <img src="images/nube1.png" class="nube-img nube-1" alt="Nube">
    <img src="images/nube2.png" class="nube-img nube-2" alt="Nube">
    <img src="images/nube3.png" class="nube-img nube-3" alt="Nube arcoíris">
  </div>

  <div class="fondo-granja"></div>

  <div id="zona-arcoiris"></div>

  <div class="contenedor">

    <div class="nombre-autor">🌈 María Teresa Palomino Nájera 🌈</div>

    <h1>Cronómetro Arcoíris</h1>

    <div class="arcoiris-principal">🌈</div>

    <div id="tiempo">00:00.00</div>

    <div class="botones">
      <button id="play">▶️ Play</button>
      <button id="detener">⏸️ Detener</button>
      <button id="reiniciar">🔄 Reiniciar</button>
    </div>

  </div>

<script>
  let tiempo_acumulado = 0;  
  let tiempo_inicio = null;  
  let intervalo = null;

  const limite = 15 * 60 * 1000;

  const tiempo = document.getElementById("tiempo");
  const boton_play = document.getElementById("play");
  const boton_detener = document.getElementById("detener");
  const boton_reiniciar = document.getElementById("reiniciar");

  const zona_arcoiris = document.getElementById("zona-arcoiris");

  const tiempo_entre_arcoiris = 1 * 60 * 1000;
  const velocidad_arcoiris = 1.5;

  const sonido_arcoiris = new Audio("audio/sonido_pollito.mp3");
  sonido_arcoiris.volume = 1;
  sonido_arcoiris.preload = "auto";

  let lista_arcoiris = [];
  let intervalo_arcoiris = null;
  let animacion_arcoiris = null;
  let arcoiris_activos = false;
  let siguiente_arcoiris_ms = tiempo_entre_arcoiris;

  function mostrar_tiempo(ms) {
    let minutos = Math.floor(ms / 60000);
    let segundos = Math.floor((ms % 60000) / 1000);
    let milesimas = Math.floor((ms % 1000) / 10);

    let minutos_texto = String(minutos).padStart(2, "0");
    let segundos_texto = String(segundos).padStart(2, "0");
    let milesimas_texto = String(milesimas).padStart(2, "0");

    tiempo.textContent = minutos_texto + ":" + segundos_texto + "." + milesimas_texto;
  }

  function generar_arcoiris_por_tiempo(transcurrido) {
    while (
      siguiente_arcoiris_ms <= limite &&
      transcurrido >= siguiente_arcoiris_ms
    ) {
      crear_arcoiris();
      siguiente_arcoiris_ms += tiempo_entre_arcoiris;
    }
  }

  function actualizar_cronometro() {
    let ahora = performance.now();
    let transcurrido = tiempo_acumulado + (ahora - tiempo_inicio);

    if (transcurrido >= limite) {
      transcurrido = limite;

      generar_arcoiris_por_tiempo(transcurrido);
      mostrar_tiempo(transcurrido);

      clearInterval(intervalo);
      intervalo = null;
      tiempo_acumulado = limite;

      detener_arcoiris();

      return;
    }

    generar_arcoiris_por_tiempo(transcurrido);
    mostrar_tiempo(transcurrido);
  }

  function iniciar_cronometro() {
    if (intervalo === null && tiempo_acumulado < limite) {
      tiempo_inicio = performance.now();
      intervalo = setInterval(actualizar_cronometro, 10);
      iniciar_arcoiris();
    }
  }

  function detener_cronometro() {
    if (intervalo !== null) {
      tiempo_acumulado += performance.now() - tiempo_inicio;
      clearInterval(intervalo);
      intervalo = null;
      detener_arcoiris();
    }
  }

  function reiniciar_cronometro() {
    clearInterval(intervalo);
    intervalo = null;
    tiempo_acumulado = 0;
    tiempo_inicio = null;

    mostrar_tiempo(0);
    reiniciar_arcoiris();
  }

  function reproducir_sonido_arcoiris() {
    const sonido = sonido_arcoiris.cloneNode();
    sonido.volume = sonido_arcoiris.volume;

    sonido.play().catch(() => {
    });
  }

  function crear_arcoiris() {
    const arcoiris_elem = document.createElement("div");
    arcoiris_elem.classList.add("arcoiris-suelto");
    arcoiris_elem.textContent = "🌈";

    zona_arcoiris.appendChild(arcoiris_elem);
    reproducir_sonido_arcoiris();  

    const size = arcoiris_elem.offsetWidth || 42;
    const ancho = zona_arcoiris.clientWidth;
    const alto = zona_arcoiris.clientHeight;

    const x = Math.random() * (ancho - size);
    const y = Math.random() * (alto - size);

    const datos = {
      elemento: arcoiris_elem,
      x,
      y,
      dx: (Math.random() - 0.5) * velocidad_arcoiris * 2,
      dy: (Math.random() - 0.5) * velocidad_arcoiris * 2,
      arrastrando: false
    };

    actualizar_posicion_arcoiris(datos);
    activar_arrastre_arcoiris(datos);

    lista_arcoiris.push(datos);
  }

  function activar_arrastre_arcoiris(datos) {
    const arcoiris_elem = datos.elemento;

    let offsetX = 0;
    let offsetY = 0;

    arcoiris_elem.addEventListener("pointerdown", (e) => {
      datos.arrastrando = true;

      const rect = arcoiris_elem.getBoundingClientRect();

      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;

      arcoiris_elem.setPointerCapture(e.pointerId);
    });

    arcoiris_elem.addEventListener("pointermove", (e) => {
      if (!datos.arrastrando) return;

      const rect_zona = zona_arcoiris.getBoundingClientRect();

      datos.x = e.clientX - rect_zona.left - offsetX;
      datos.y = e.clientY - rect_zona.top - offsetY;

      limitar_arcoiris_a_zona(datos);
      actualizar_posicion_arcoiris(datos);
    });

    arcoiris_elem.addEventListener("pointerup", () => {
      datos.arrastrando = false;
      datos.dx = (Math.random() - 0.5) * velocidad_arcoiris * 2;
      datos.dy = (Math.random() - 0.5) * velocidad_arcoiris * 2;
    });

    arcoiris_elem.addEventListener("pointercancel", () => {
      datos.arrastrando = false;
    });
  }

  function limitar_arcoiris_a_zona(datos) {
    const size = datos.elemento.offsetWidth || 42;
    const ancho = zona_arcoiris.clientWidth;
    const alto = zona_arcoiris.clientHeight;

    datos.x = Math.max(0, Math.min(ancho - size, datos.x));
    datos.y = Math.max(0, Math.min(alto - size, datos.y));
  }

  function actualizar_posicion_arcoiris(datos) {
    datos.elemento.style.left = datos.x + "px";
    datos.elemento.style.top = datos.y + "px";
  }

  function mover_arcoiris() {
    if (!arcoiris_activos) return;

    lista_arcoiris.forEach(datos => {
      if (datos.arrastrando) return;

      datos.x += datos.dx;
      datos.y += datos.dy;

      const size = datos.elemento.offsetWidth || 42;
      const ancho = zona_arcoiris.clientWidth;
      const alto = zona_arcoiris.clientHeight;

      if (datos.x <= 0 || datos.x >= ancho - size) {
        datos.dx *= -1;
      }

      if (datos.y <= 0 || datos.y >= alto - size) {
        datos.dy *= -1;
      }

      if (Math.random() < 0.02) {
        datos.dx = (Math.random() - 0.5) * velocidad_arcoiris * 2;
        datos.dy = (Math.random() - 0.5) * velocidad_arcoiris * 2;
      }

      limitar_arcoiris_a_zona(datos);
      actualizar_posicion_arcoiris(datos);
    });

    animacion_arcoiris = requestAnimationFrame(mover_arcoiris);
  }

  function iniciar_arcoiris() {
    if (arcoiris_activos) return;

    arcoiris_activos = true;
    mover_arcoiris();
  }

  function detener_arcoiris() {
    arcoiris_activos = false;

    cancelAnimationFrame(animacion_arcoiris);
    animacion_arcoiris = null;
  }

  function reiniciar_arcoiris() {
    detener_arcoiris();

    lista_arcoiris.forEach(datos => {
      datos.elemento.remove();
    });

    lista_arcoiris = [];
    siguiente_arcoiris_ms = tiempo_entre_arcoiris;
  }

  boton_play.addEventListener("click", iniciar_cronometro);
  boton_detener.addEventListener("click", detener_cronometro);
  boton_reiniciar.addEventListener("click", reiniciar_cronometro);

  mostrar_tiempo(0);
</script>

</body>
</html>
